<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ContentBlock — a modern blog for developers and creators." />
    <title>PlacesGallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <!-- SFMC Content Block SDK -->
    <script src="https://code.exacttarget.com/content-block-sdk/1.0/sdk.js"></script>
    <script>
      // Initialize SFMC SDK synchronously before React loads
      try {
        if (window.sfdc && window.sfdc.BlockSDK) {
          var sdk = new window.sfdc.BlockSDK();
          sdk.setBlockEditorWidth('full');
          window.__sfmcSdk = sdk;
        }
      } catch (e) {
        console.warn('SFMC SDK init failed:', e);
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
